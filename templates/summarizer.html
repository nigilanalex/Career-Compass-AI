<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Report Summarizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-compass me-2"></i>Career Compass AI
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/career">Career</a>
            <a class="nav-link active" href="/summarizer">Summarizer</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">
            <i class="bi bi-file-earmark-text me-2"></i>AI Report Summarizer
        </h1>
        <p class="lead">Upload any PDF report and let Google Gemini AI generate a smart summary.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark text-white shadow-lg p-5">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form id="summaryForm" action="/summarize" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label">Select PDF File</label>
                        <input type="file" name="pdf" class="form-control" accept=".pdf,application/pdf" required>
                    </div>

                    <div class="d-grid">
                        <button id="submitBtn" class="btn btn-primary btn-lg">
                            <i class="bi bi-stars me-2"></i>Summarize with Gemini AI
                        </button>
                    </div>
                </form>

                <div id="loading" style="display:none;" class="text-center mt-5">
                    <div class="spinner-border text-info" role="status"></div>
                    <h4 class="mt-4">AI is analyzing your document...</h4>
                    <p class="text-light">
                        Extracting text...<br>
                        Generating summary...<br>
                        Please wait...
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3">
    <p class="text-light">&copy; 2026 Career Compass AI</p>
</footer>

<script>
    document.getElementById("summaryForm").addEventListener("submit", function () {
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("loading").style.display = "block";
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
