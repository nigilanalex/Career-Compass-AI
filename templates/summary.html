<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generated Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-compass me-2"></i>Career Compass AI
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/career">Career</a>
            <a class="nav-link" href="/summarizer">Summarizer</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">
            <i class="bi bi-file-earmark-text me-2"></i>AI Generated Summary
        </h1>
        <p class="lead">Generated using Google Gemini AI</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card bg-dark text-white shadow-lg p-5">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                    <h3 class="text-info mb-0">
                        <i class="bi bi-stars me-2"></i>Summary
                    </h3>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-light" id="copySummary">
                            <i class="bi bi-clipboard me-2"></i>Copy
                        </button>
                        <button type="button" class="btn btn-outline-light" id="downloadSummary">
                            <i class="bi bi-download me-2"></i>Download
                        </button>
                    </div>
                </div>

                <hr>
                <div id="summaryText" class="summary-box">{{ summary }}</div>
                <hr class="my-4">

                <div class="row g-3">
                    <div class="col-md-6 d-grid">
                        <a href="/summarizer" class="btn btn-primary btn-lg">
                            <i class="bi bi-file-earmark-pdf me-2"></i>Summarize Another PDF
                        </a>
                    </div>
                    <div class="col-md-6 d-grid">
                        <a href="/" class="btn btn-outline-light btn-lg">
                            <i class="bi bi-house-door me-2"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3">
    <p class="text-light">&copy; 2026 Career Compass AI | Powered by Gemini AI</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const summaryText = document.getElementById("summaryText");
    const copySummary = document.getElementById("copySummary");
    const downloadSummary = document.getElementById("downloadSummary");

    copySummary.addEventListener("click", async () => {
        await navigator.clipboard.writeText(summaryText.innerText);
        copySummary.innerHTML = '<i class="bi bi-check2 me-2"></i>Copied';
        setTimeout(() => {
            copySummary.innerHTML = '<i class="bi bi-clipboard me-2"></i>Copy';
        }, 1600);
    });

    downloadSummary.addEventListener("click", () => {
        const blob = new Blob([summaryText.innerText], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ai-summary.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    });
</script>
</body>
</html>
